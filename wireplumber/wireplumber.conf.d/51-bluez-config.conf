monitor.bluez.properties = {
  # Enable all codecs - prefer high quality
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.enable-hw-volume = true

  # Codec preference: LDAC > AAC > SBC-XQ > SBC
  bluez5.a2dp.codec.priority = [ ldac aac sbc_xq sbc ]

  # Reconnect on profile availability changes
  bluez5.auto-connect = [ a2dp_sink hfp_hf ]

  # Keep A2DP profile (don't auto-switch to HSP/HFP)
  bluez5.autoswitch-profile = false
}

monitor.bluez.rules = [
  {
    matches = [
      { device.name = "~bluez_card.*" }
    ]
    actions = {
      update-props = {
        bluez5.a2dp.aac.bitratemode = 0
        bluez5.a2dp.ldac.quality = "auto"

        # Session latency in ms - higher = more buffer against dropouts
        session.suspend-timeout-seconds = 0
      }
    }
  }
  {
    # Disable HSP/HFP on WH-1000XM5 so Discord can't hijack the profile
    matches = [
      { device.name = "bluez_card.88_C9_E8_63_16_A4" }
    ]
    actions = {
      update-props = {
        bluez5.hw-offload-sco = false
        bluez5.roles = [ a2dp_sink ]
        device.profile = "a2dp-sink"
      }
    }
  }
]
